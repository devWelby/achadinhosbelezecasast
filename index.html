<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achados Beleza e Casa St</title>

    <meta name="description" content="Os melhores produtos com links diretos e preços imperdíveis 💸">
    <meta property="og:title" content="Achados Beleza e Casa St">
    <meta property="og:description" content="Confira minhas recomendações exclusivas da Shopee.">
    <meta property="og:type" content="website">

    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src * data: blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline' https://www.gstatic.com; connect-src 'self' https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firebasestorage.googleapis.com https://*.googleusercontent.com https://www.gstatic.com;">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#b85c38">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <div class="container">


        <header class="profile-section">
            <img src="assets/logo.jpg" alt="Logo Achados Beleza e Casa St" class="profile-img">

            <h1 class="profile-name">
                <img src="assets/logo.jpg" alt="Logo" class="title-logo">
                Achados Beleza e Casa St
            </h1>
            <p class="profile-bio">Os melhores produtos com links diretos e descontos imperdíveis 💸✨</p>

            <div class="social-links">
                <a href="https://instagram.com/seu_usuario" target="_blank" rel="noopener noreferrer" class="social-btn"
                    aria-label="Acessar Instagram"><i class="fab fa-instagram"></i></a>
                <a href="https://tiktok.com/@seu_usuario" target="_blank" rel="noopener noreferrer" class="social-btn"
                    aria-label="Acessar TikTok"><i class="fab fa-tiktok"></i></a>
            </div>

            <div class="stats-badge" title="Cliques totais gerados por esta página">
                <i class="fas fa-fire"></i> <span id="click-counter">0</span> acessos aos produtos
            </div>
        </header>

        <main>
            <div class="filters-section">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="Buscar achadinhos..."
                        aria-label="Buscar produtos">
                </div>
                <div class="categories" id="categories-container" aria-label="Filtro de categorias">
                    <!-- Categorias dinâmicas entrarão aqui -->
                </div>
            </div>

            <div id="loading-spinner" class="loading-container">
                <div class="spinner"></div>
                <p>Carregando achadinhos...</p>
            </div>
            <section class="products-grid" id="products-grid" style="display: none;">
            </section>
        </main>

        <footer>
            Feito com <i class="fas fa-heart"></i> para boas compras <br>
            &copy; <span id="year"></span> devWelby
        </footer>
    </div>

    <div id="toast" class="toast">
        <i class="fas fa-check-circle"></i> Link copiado com sucesso!
    </div>

    <script type="module" src="js/script.js"></script>
</body>

</html>
